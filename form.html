<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete the survey – your feedback drives our improvements.">
    <title>Survey • FormCraft</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --accent: #f59e0b;
            --text-dark: #1e293b;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --white: #ffffff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow-lg: 0 20px 50px -12px rgba(0,0,0,0.12);
            --radius-lg: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }
        .navbar-inner {
            max-width: 1100px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px; padding: 0 1.5rem;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 1.25rem; color: var(--primary);
            text-decoration: none; letter-spacing: -0.3px;
        }
        .nav-logo .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem; box-shadow: 0 4px 12px rgba(79,70,229,0.3);
        }
        .nav-links {
            display: flex; list-style: none; gap: 2rem; align-items: center;
        }
        .nav-links a {
            text-decoration: none; color: var(--text-medium); font-weight: 500;
            font-size: 0.95rem; transition: color var(--transition);
            position: relative;
        }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 2px; background: var(--primary);
            transition: width var(--transition); border-radius: 1px;
        }
        .nav-links a:hover::after { width: 100%; }
        .btn-nav {
            background: var(--primary); color: white !important;
            padding: 0.55rem 1.4rem; border-radius: 50px; font-weight: 600;
            font-size: 0.9rem; box-shadow: 0 4px 14px rgba(79,70,229,0.3);
            transition: all var(--transition);
        }
        .btn-nav:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.4); }
        .btn-nav::after { display: none !important; }
        .nav-toggle {
            display: none; background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: var(--text-dark);
        }

        /* Form Container */
        .form-section {
            max-width: 800px; margin: 2rem auto 4rem; padding: 0 1.5rem;
        }
        .form-card {
            background: var(--card-bg); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); overflow: hidden;
            border: 1px solid var(--border);
        }
        .form-card-header {
            background: linear-gradient(135deg, #4f46e5, #6366f1, #7c3aed);
            padding: 1.5rem 2rem; color: white;
            display: flex; align-items: center; gap: 14px;
        }
        .header-icon {
            width: 44px; height: 44px; background: rgba(255,255,255,0.2);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem;
        }
        .form-card-header h3 {
            font-weight: 700; font-size: 1.2rem; letter-spacing: -0.2px;
        }
        .form-card-header span {
            font-size: 0.85rem; opacity: 0.85; font-weight: 400; display: block;
        }

        /* Progress Bar */
        .progress-bar {
            height: 5px; background: var(--border); width: 100%;
        }
        .progress-fill {
            height: 100%; width: 0%; background: linear-gradient(to right, #a78bfa, var(--primary));
            transition: width 0.6s ease;
        }

        /* Iframe */
        .iframe-wrapper {
            position: relative; width: 100%; min-height: 700px;
            background: #fafafa;
        }
        .iframe-wrapper iframe {
            width: 100%; height: 100%; min-height: 700px;
            border: none; display: block;
        }
        .iframe-loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; color: var(--text-light);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Info Cards */
        .info-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem; padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
        }
        .info-item {
            display: flex; align-items: flex-start; gap: 10px;
            font-size: 0.9rem; color: var(--text-medium);
        }
        .info-item i { color: var(--primary); font-size: 1.1rem; margin-top: 2px; }
        .info-item strong {
            display: block; color: var(--text-dark); font-weight: 600; font-size: 0.85rem;
            margin-bottom: 2px;
        }

        /* Back button */
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--primary); text-decoration: none; font-weight: 500;
            margin-bottom: 1rem; transition: var(--transition);
        }
        .back-link:hover { opacity: 0.8; }

        /* Footer */
        .footer {
            text-align: center; padding: 2rem 1.5rem;
            color: var(--text-light); font-size: 0.85rem;
            border-top: 1px solid var(--border);
            background: rgba(255,255,255,0.5);
        }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .footer-heart { color: #ef4444; animation: pulse 1.5s infinite; display: inline-block; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nav-toggle { display: block; }
            .nav-links.mobile-open {
                display: flex; flex-direction: column; position: absolute;
                top: 64px; left: 0; right: 0;
                background: rgba(255,255,255,0.97); backdrop-filter: blur(18px);
                padding: 1.5rem; gap: 1.2rem;
                border-bottom: 1px solid var(--border); box-shadow: var(--shadow-lg);
                z-index: 99;
            }
            .form-card-header { padding: 1.2rem 1.25rem; }
            .iframe-wrapper, .iframe-wrapper iframe { min-height: 600px; }
            .info-row { padding: 1rem 1.25rem; grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon"><i class="fa-solid fa-clipboard-list"></i></span>
                FormCraft
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="form.html" class="active">Survey</a></li>
                <li><a href="form.html" class="btn-nav">Fill Out Form</a></li>
            </ul>
        </div>
    </nav>

    <main class="form-section">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

        <div class="form-card">
            <div class="form-card-header">
                <div class="header-icon"><i class="fa-solid fa-pen-to-square"></i></div>
                <div>
                    <h3>Feedback Survey</h3>
                    <span>We appreciate your honesty</span>
                </div>
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="iframe-wrapper">
                <div class="iframe-loading" id="iframeLoading">
                    <div class="spinner"></div>
                    <span>Loading form…</span>
                </div>

                <!-- ╔══════════════════════════════════════════╗
                     ║  REPLACE WITH YOUR GOOGLE FORM URL   ║
                     ╚══════════════════════════════════════════╝ -->
                <iframe
                    id="googleFormIframe"
                    src="https://docs.google.com/forms/d/e/1FAIpQLSdd17ylSBbj0-aM41BrNb_N1aV5MUJVfFW9v93i2DPEdcjRpg/viewform?usp=header"
                    title="Google Form - Feedback Survey"
                    allow="camera; microphone; autoplay; encrypted-media;"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
                    loading="lazy"
                    onload="document.getElementById('iframeLoading').style.display='none'; animateProgress();"
                >
                    Loading…
                </iframe>
            </div>

            <div class="info-row">
                <div class="info-item">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span><strong>Secure Submission</strong>Encrypted via Google Forms</span>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span><strong>~2 min</strong>Average completion time</span>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-mobile-screen"></i>
                    <span><strong>Fully Responsive</strong>Works on all devices</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Made with <span class="footer-heart">❤️</span> • Hosted on GitHub Pages • © <span id="year"></span></p>
    </footer>

    <script>
        // Mobile menu toggle (same as homepage)
        const toggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        toggle.addEventListener('click', () => {
            const isOpen = navLinks.classList.toggle('mobile-open');
            toggle.setAttribute('aria-expanded', isOpen);
            const icon = toggle.querySelector('i');
            icon.className = isOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
        });
        document.querySelectorAll('#navLinks a').forEach(link => link.addEventListener('click', () => {
            if (navLinks.classList.contains('mobile-open')) {
                navLinks.classList.remove('mobile-open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.querySelector('i').className = 'fa-solid fa-bars';
            }
        }));

        // Animate progress bar after iframe loads (simulated)
        function animateProgress() {
            const fill = document.getElementById('progressFill');
            fill.style.width = '100%';
        }

        // Fallback for loading spinner
        const loadingDiv = document.getElementById('iframeLoading');
        setTimeout(() => {
            if (loadingDiv.style.display !== 'none') loadingDiv.style.display = 'none';
        }, 12000);

        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
